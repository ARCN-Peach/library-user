# ------------------------------------------------------------------
# SonarQube / SonarCloud configuration for library-user
# ------------------------------------------------------------------

# Project identity
sonar.organization=arcn-peach
sonar.projectKey=ARCN-Peach_library-user
sonar.projectName=library-user
sonar.projectVersion=0.0.1-SNAPSHOT

# Encoding and SCM
sonar.sourceEncoding=UTF-8
sonar.scm.provider=git

# Source layout
sonar.sources=src/main/java,src/main/resources
sonar.tests=src/test/java
sonar.java.source=21

# Java binaries produced by Maven
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

# Libraries used for semantic analysis
sonar.java.libraries=target/dependency/*.jar
sonar.java.test.libraries=target/dependency/*.jar

# Test execution reports
sonar.junit.reportPaths=target/surefire-reports,target/failsafe-reports

# JaCoCo XML coverage reports
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Explicit inclusions
sonar.inclusions=src/main/java/**,src/main/resources/**
sonar.test.inclusions=src/test/java/**

# General exclusions from static analysis
sonar.exclusions=\
  target/**,\
  .github/**,\
  .vscode/**,\
  .sonarlint/**,\
  docs/**,\
  planning/**,\
  src/main/resources/db/migration/**

# Coverage exclusions aligned with the Maven JaCoCo gate
sonar.coverage.exclusions=\
  **/LibraryUserApplication.java,\
  **/interfaces/http/**,\
  **/infrastructure/**,\
  **/application/dto/**,\
  **/application/exception/**,\
  **/application/port/**

# Duplication exclusions for low-value boilerplate and records
sonar.cpd.exclusions=\
  **/interfaces/http/request/**,\
  **/interfaces/http/response/**,\
  **/application/dto/**,\
  **/application/exception/**,\
  **/application/port/**,\
  **/infrastructure/config/**,\
  **/infrastructure/persistence/entity/**
