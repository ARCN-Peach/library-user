server:
  port: 8081

spring:
  application:
    name: library-user
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/library_user}
    username: ${DB_USER:user_user}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.library.user: INFO
    org.springframework.amqp: WARN
  pattern:
    level: "%5p [corr:%X{correlationId}]"

app:
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-1234567890}
    access-token-ttl-seconds: 900
  outbox:
    batch-size: 50
    exchange: library.user.exchange
    poll-ms: 5000
  bootstrap:
    librarian:
      enabled: ${BOOTSTRAP_LIBRARIAN_ENABLED:false}
      name: ${BOOTSTRAP_LIBRARIAN_NAME:}
      email: ${BOOTSTRAP_LIBRARIAN_EMAIL:}
      password: ${BOOTSTRAP_LIBRARIAN_PASSWORD:}
